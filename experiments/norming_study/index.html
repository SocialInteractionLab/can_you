<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading experiment...</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    p { font-size: 1.1em; color: #444; }
  </style>
</head>
<body>
  <p>Loading experiment, please wait...</p>
  <script>
    // Routing DataPipe ID — used only for sequential condition assignment (not data saving).
    // Must be a separate DataPipe experiment with n_conditions set to ASSIGNMENT_LIST.length.
    // Run generate_conditions.py with n_conditions=3 to regenerate ASSIGNMENT_LIST.
    const DATAPIPE_ID     = 'YOUR_ROUTING_DATAPIPE_ID';   // TODO: set before launch
    const CONDITIONS      = ['joint', 'linear-aw', 'linear-wa'];
    const ASSIGNMENT_LIST = [2,0,1,0,2,1,0,1,2,0,1,2,0,2,1,1,0,2,0,2,1,2,0,1,1,2,0,2,1,0,1,2,0,2,0,1,0,1,2,1,0,2,1,2,0,0,2,1,2,0,1,1,2,0,2,1,0,0,2,1,2,0,1,0,1,2,1,2,0,0,1,2,1,0,2,0,2,1,2,1,0,0,2,1,1,0,2,1,0,2,0,1,2,2,0,1,0,2,1,2,0,1,2,1,0,0,2,1,1,2,0,1,0,2,2,1,0,0,1,2,1,2,0,2,0,1,0,2,1,1,0,2,2,1,0,1,2,0,0,2,1,0,1,2,2,0,1,1,2,0,0,1,2,1,0,2,2,1,0,0,2,1,1,0,2,2,0,1,1,2,0,2,1,0,1,0,2,0,1,2,1,0,2,1,2,0,0,1,2,2,1,0,1,2,0,1,0,2,2,1,0,2,1,0,0,2,1,1,0,2,0,1,2,2,0,1,1,2,0,0,1,2,2,0,1,1,0,2,0,2,1,1,2,0,0,1,2,2,1,0,1,0,2,0,2,1,2,1,0,1,2,0,0,2,1,1,0,2,2,1,0,0,2,1,2,0,1,1,2,0,2,0,1,0,1,2,1,2,0,2,0,1,1,0,2,0,2,1,1,2,0,0,1,2,2,0,1,1,2,0];
    // ASSIGNMENT_LIST.length = 300 (100 joint, 100 linear-aw, 100 linear-wa)
    // Update DataPipe n_conditions to match ASSIGNMENT_LIST.length

    // condition → subfolder + extra query params
    function conditionToURL(condition, params) {
      if (condition === 'joint') {
        return `./joint/?${params.toString()}`;
      } else if (condition === 'linear-aw') {
        params.set('axis', 'AW');
        return `./linear/?${params.toString()}`;
      } else if (condition === 'linear-wa') {
        params.set('axis', 'WA');
        return `./linear/?${params.toString()}`;
      }
      // fallback
      return `./joint/?${params.toString()}`;
    }

    (async () => {
      const params = new URLSearchParams(window.location.search);
      const pid    = params.get('PROLIFIC_PID') || 'no_pid';

      // dev shortcut: ?type=joint|linear-aw|linear-wa bypasses DataPipe entirely
      const devType = params.get('type');
      if (devType && CONDITIONS.includes(devType)) {
        params.delete('type');
        console.log('Dev override — routing to:', devType);
        window.location.replace(conditionToURL(devType, params));
        return;
      }

      // don't burn a slot on reload — reuse cached assignment
      const condKey      = `condition_${DATAPIPE_ID}_${pid}`;
      const idxKey       = `assignment_idx_${DATAPIPE_ID}_${pid}`;
      let condition      = sessionStorage.getItem(condKey);
      let assignment_idx = sessionStorage.getItem(idxKey);

      if (!condition) {
        try {
          const res = await fetch('https://pipe.jspsych.org/api/condition/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: '*/*' },
            body: JSON.stringify({ experimentID: DATAPIPE_ID })
          });
          if (!res.ok) throw new Error(`DataPipe returned ${res.status}`);
          const data = await res.json();
          const idx = data.condition;
          if (idx < ASSIGNMENT_LIST.length) {
            condition      = CONDITIONS[ASSIGNMENT_LIST[idx]];
            assignment_idx = String(idx);
          } else {
            condition      = CONDITIONS[Math.floor(Math.random() * CONDITIONS.length)];
            assignment_idx = 'rand';
          }
          sessionStorage.setItem(condKey, condition);
          sessionStorage.setItem(idxKey, assignment_idx);
        } catch (err) {
          console.warn('DataPipe condition routing failed, falling back to random:', err);
          condition      = CONDITIONS[Math.floor(Math.random() * CONDITIONS.length)];
          assignment_idx = 'rand';
          sessionStorage.setItem(condKey, condition);
          sessionStorage.setItem(idxKey, assignment_idx);
        }
      }

      console.log('Assigned condition:', condition, '| assignment_idx:', assignment_idx);
      params.set('assignment_idx', assignment_idx);
      window.location.replace(conditionToURL(condition, params));
    })();
  </script>
</body>
</html>
